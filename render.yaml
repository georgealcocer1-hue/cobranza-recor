services:
  - type: web
    name: cobranza-recor
    runtime: node
    buildCommand: npm install --prefix server && npm install --prefix client && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cobranza-db
          property: connectionString

databases:
  - name: cobranza-db
    databaseName: cobranza
    plan: free
